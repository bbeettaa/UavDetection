syntax = "proto3";

package bytetrack;

option java_multiple_files = true;
option java_package = "knu.app.grpc.bytetrack";
option java_outer_classname = "ByteTrackProtos";

import "google/protobuf/empty.proto";

// ========================
// CONFIGURATION
// ========================
message TrackerConfig {
  float track_thresh = 1;
  float high_thresh = 2;
  float match_thresh = 3;
  int32 track_buffer = 4;
}

message InitRequest {
  TrackerConfig config = 1;
}

message InitResponse {
  bool success = 1;
}

// ========================
// DETECTIONS & TRACKING
// ========================
message Detection {
  string class_name = 1;
  float confidence = 2;
  float x = 3;
  float y = 4;
  float width = 5;
  float height = 6;
}

message DetectionResult {
  repeated Detection detections = 1;
}

message TrackedObject {
  string id = 1;
  string class_name = 2;
  float confidence = 3;
  float x = 4;
  float y = 5;
  float width = 6;
  float height = 7;
}

message UpdateRequest {
  bytes frame = 1; // JPEG encoded Mat
  DetectionResult det_result = 2;
}

message UpdateResponse {
  repeated TrackedObject tracks = 1;
}

// ========================
// BUFFER CAPACITY
// ========================
message BufferCapacityResponse {
  int32 capacity = 1;
}

// ========================
// SERVICE
// ========================
service ByteTrackService {
  rpc Init(InitRequest) returns (InitResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Close(google.protobuf.Empty) returns (google.protobuf.Empty);
  rpc GetBufferCapacity(google.protobuf.Empty) returns (BufferCapacityResponse);
}
