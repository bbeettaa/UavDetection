syntax = "proto3";

package ssd.detector;

import "google/protobuf/empty.proto";

// =======================================
// CONFIG
// =======================================

message SsdConfig {
  string model_path = 1;
  int32 input_width = 2;
  int32 input_height = 3;
  float confidence_threshold = 4;
  float nms_threshold = 5;
  int32 max_detections = 6;
}

message GetConfigResponse {
  SsdConfig config = 1;
}

// =======================================
// SESSION CONTROL
// =======================================

message SessionRequest {
  string session_id = 1;
}

message StreamStatus {
  bool success = 1;
  string message = 2;
}

// =======================================
// FRAME INPUT
// =======================================

message FrameRequest {
  string session_id = 1;
  bytes image = 2;         // JPEG/PNG encoded frame
  int64 timestamp = 3;
}

// =======================================
// DETECTION OUTPUT
// =======================================

message Detection {
  string class_name = 1;
  int32 class_id = 2;
  float confidence = 3;

  float x = 4;
  float y = 5;
  float width = 6;
  float height = 7;
}

message TrackingResult {
  int64 timestamp = 1;
  repeated Detection detections = 2;
}

// =======================================
// SERVICE
// =======================================

service SsdDetectionService {
  rpc SetConfig (SsdConfig) returns (google.protobuf.Empty);
  rpc GetConfig (google.protobuf.Empty) returns (GetConfigResponse);

  rpc StartStreaming (SessionRequest) returns (StreamStatus);
  rpc StopStreaming (SessionRequest) returns (StreamStatus);
  rpc RestartConnection (SessionRequest) returns (StreamStatus);

  rpc StreamDetect (stream FrameRequest) returns (stream TrackingResult);
}
